{% if region_data and region_data.courses %}
<div class="course-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for course in region_data.courses %}
    <div class="course-card bg-white rounded-lg shadow-md p-4 border-l-4"
         style="border-left-color: {{ region_data.fill_color }};">
        <div class="flex items-start justify-between mb-2">
            <h3 class="font-bold text-gray-800">{{ course.name }}</h3>
            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">
                {{ course.difficulty.value }}
            </span>
        </div>
        <p class="text-sm text-gray-600 mb-3">{{ course.description }}</p>
        <div class="flex items-center justify-between">
            <span class="text-xs text-gray-500">📍 {{ course.region.value }} ・ 📝 {{ course.question_count }}問</span>
            <form method="post" action="/quiz/start/{{ course.id }}">
                <button type="submit" class="text-xs bg-orange-500 text-white px-3 py-1 rounded hover:bg-orange-600 transition-colors">
                    ▶ 開始
                </button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="empty-state text-center py-8 text-gray-500">
    <p class="text-3xl mb-2">🚧</p>
    <p class="font-medium">コースは現在準備中です</p>
    <p class="text-sm">もうしばらくお待ちください。</p>
</div>
{% endif %}
