<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}愛媛探索AIクイズ{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Tailwind CSS CDN（開発用） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- カスタムCSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-orange-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold">🍊 愛媛探索AIクイズ</a>
            <nav>
                <a href="/" class="text-white hover:text-orange-200 ml-4">コース選択</a>
                <a href="/results/dashboard" class="text-white hover:text-orange-200 ml-4">ダッシュボード</a>
                <a href="/study" class="text-white hover:text-orange-200 ml-4">用語集</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8">
        <p>&copy; 2026 愛媛探索AIクイズ - PBLプロジェクト</p>
        <p class="mt-1 text-xs"><a href="/licenses" class="hover:text-gray-200">ライセンス・クレジット</a></p>
    </footer>

    {% block scripts %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
