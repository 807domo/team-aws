{% extends "base.html" %}

{% block title %}ログイン - 愛媛探索AIクイズ{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">🍊 ログイン</h1>
            <p class="text-gray-500 mt-2">おかえりなさい！</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
            <p class="text-sm">{{ error }}</p>
        </div>
        {% endif %}

        <form action="/auth/login" method="post" class="space-y-4">
            <div>
                <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">
                    表示名
                </label>
                <input
                    type="text"
                    id="display_name"
                    name="display_name"
                    value="{{ display_name | default('', true) }}"
                    required
                    placeholder="登録した表示名"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    パスワード
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="パスワード"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold hover:bg-orange-700 transition"
            >
                ログイン
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                アカウントをお持ちでない方は
                <a href="/auth/register" class="text-orange-600 hover:text-orange-700 font-medium">新規登録</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
